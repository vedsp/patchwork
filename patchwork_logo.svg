  <line x1="395" y1="410" x2="465" y2="410" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="395" y1="430" x2="475" y2="430" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="395" y1="450" x2="455" y2="450" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Diagonal stitch line connecting the two docs -->
  <line x1="310" y1="340" x2="370" y2="370" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round" opacity="0.9" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:3px;stroke-dasharray:8px, 6px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Stitch tick marks along the seam -->
  <line x1="318" y1="333" x2="322" y2="347" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="331" y1="340" x2="335" y2="354" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="344" y1="347" x2="348" y2="361" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="357" y1="354" x2="361" y2="368" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Minus on left doc (old) -->
  <line x1="182" y1="218" x2="210" y2="218" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.85" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Plus on right doc (new) -->
  <line x1="382" y1="342" x2="410" y2="342" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.85" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="396" y1="328" x2="396" y2="356" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.85" style="fill:rgb(0, 0, 0);stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>