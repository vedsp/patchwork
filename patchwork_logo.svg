  <polyline points="470,315 470,355 510,355" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linejoin="round" style="fill:none;stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="470" y1="315" x2="510" y2="355" fill="none" stroke="#f59e0b" stroke-width="5" style="fill:none;stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Right doc lines -->
